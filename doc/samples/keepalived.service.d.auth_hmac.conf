# Sample systemd drop-in that feeds the VRRP auth_hmac key to keepalived as a
# credential, so the secret never sits in keepalived.conf.
#
# Install it as a drop-in for the keepalived unit, then reload and restart:
#   install -Dm644 keepalived.service.d.auth_hmac.conf \
#       /etc/systemd/system/keepalived.service.d/auth_hmac.conf
#   systemctl daemon-reload && systemctl restart keepalived
#
# Provision the credential once, sealed to the TPM or host key, root only:
#   umask 077
#   install -d /etc/keepalived/creds
#   printf 'hex:%s' "$(openssl rand -hex 32)" > /run/vrrp_hmac.plain
#   systemd-creds encrypt --name=vrrp_hmac \
#       /run/vrrp_hmac.plain /etc/keepalived/creds/vrrp_hmac.cred
#   shred -u /run/vrrp_hmac.plain
#
# systemd decrypts it at start and exposes it read only to root on a private
# tmpfs, removed when the unit stops, and points $CREDENTIALS_DIRECTORY there
# (/run/credentials/keepalived.service). Reference it from keepalived.conf with
# the ${_ENV} expansion, the credential name is the last path component:
#
#   vrrp_instance VI {
#       ...
#       auth_hmac {
#           key 1 file:${_ENV CREDENTIALS_DIRECTORY}/vrrp_hmac
#           active_key 1
#       }
#   }

[Service]
LoadCredentialEncrypted=vrrp_hmac:/etc/keepalived/creds/vrrp_hmac.cred

# Without a TPM or host key, drop the plaintext credential instead. It still
# lands on a private root only tmpfs, just not encrypted at rest:
#   LoadCredential=vrrp_hmac:/etc/keepalived/creds/vrrp_hmac.key

# For several keys, e.g. zero downtime rotation, use a numbered scheme with one
# credential per key id, each its own file under $CREDENTIALS_DIRECTORY:
#   LoadCredentialEncrypted=vrrp_hmac_1:/etc/keepalived/creds/vrrp_hmac_1.cred
#   LoadCredentialEncrypted=vrrp_hmac_2:/etc/keepalived/creds/vrrp_hmac_2.cred
# and the matching keys in keepalived.conf:
#   auth_hmac {
#       key 1 file:${_ENV CREDENTIALS_DIRECTORY}/vrrp_hmac_1
#       key 2 file:${_ENV CREDENTIALS_DIRECTORY}/vrrp_hmac_2
#       active_key 1
#   }
#
# Or keep the encrypted blobs in the system credential store and import the whole
# set with one glob, no per key line and no unit edit when you add a key later:
#   printf 'hex:%s' "$(openssl rand -hex 32)" \
#       | systemd-creds encrypt --name=vrrp_hmac_1 - /etc/credstore.encrypted/vrrp_hmac_1
#   ImportCredential=vrrp_hmac_*          # needs systemd 254+
# The key lines in keepalived.conf stay the same as above.
