name: "CodeQL"

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - 'doc/**'
      - 'docker/**'
      - 'goodies/**'
      - 'snap/**'
      - 'snap-tools/**'
      - 'test/**'
      - 'tools/**'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - 'doc/**'
      - 'docker/**'
      - 'goodies/**'
      - 'snap/**'
      - 'snap-tools/**'
      - 'test/**'
      - 'tools/**'

  schedule:
    - cron: "39 18 * * 2"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt update && sudo apt install libsnmp-dev libxtables-dev libip4tc-dev libip6tc-dev libipset-dev libnfnetlink-dev libnl-3-dev libnl-genl-3-dev libnl-route-3-dev libssl-dev libmagic-dev libglib2.0-dev libpcre2-dev libmnl-dev libnftnl-dev libsystemd-dev iproute2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Build
        run: |
          ./autogen.sh
          ./configure --enable-snmp --enable-snmp-rfc --enable-json --enable-dbus --enable-bfd --enable-regex
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
